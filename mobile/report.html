<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complaint Report | Krishi Kavach AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/mobile.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main class="phone has-tabbar">
    <section class="screen">
      <header class="appbar">
        <div class="title-row"><a class="icon-btn" href="dashboard.html"><i data-lucide="arrow-left"></i></a><div class="title-text"><h1>Report</h1><span>Complaint-ready file</span></div></div>
        <a class="icon-btn" href="notifications.html"><i data-lucide="bell"></i></a>
      </header>

      <section class="card">
        <div class="card-head"><h2>Report Builder</h2><span class="badge yellow">Draft</span></div>
        <form class="form">
          <div class="field"><label for="farmer">Farmer Name</label><input id="farmer" type="text" value="Ramesh Patil"></div>
          <div class="field"><label for="mobile">Mobile</label><input id="mobile" type="tel" value="+91 98765 43210"></div>
          <div class="field"><label for="village">Village</label><input id="village" type="text" value="Tasgaon, Sangli"></div>
          <div class="field"><label for="summary">Complaint Summary</label><textarea id="summary">CropSafe Insecticide QR code could not be verified. Batch number appears suspicious and crop leaves turned yellow after application.</textarea></div>
          <a class="btn btn-primary" href="report-preview.html"><i data-lucide="file-down"></i>Preview Report</a>
        </form>
      </section>
      <section class="card">
        <div class="actions">
          <a class="btn btn-outline" href="case-detail.html"><i data-lucide="folder-open"></i>Case Detail</a>
          <a class="btn btn-primary" href="submitted-success.html"><i data-lucide="send"></i>Submit</a>
        </div>
      </section>

      <section class="card">
        <div class="card-head"><h2>Evidence Attached</h2><span class="badge green">72%</span></div>
        <div class="list">
          <a class="list-row" href="evidence-attached.html"><div class="status-icon ok"><i data-lucide="package"></i></div><div><strong>Product photos</strong><span>4 packet images attached.</span></div><span class="badge yellow">1 retake</span></a>
          <a class="list-row" href="evidence-attached.html"><div class="status-icon ok"><i data-lucide="receipt-text"></i></div><div><strong>Purchase bill</strong><span>Dealer bill is clear.</span></div><span class="badge green">Clear</span></a>
          <a class="list-row" href="evidence-attached.html"><div class="status-icon ok"><i data-lucide="sprout"></i></div><div><strong>Crop damage</strong><span>3 field photos attached.</span></div><span class="badge green">Clear</span></a>
        </div>
      </section>
    </section>

    <nav class="tabbar">
      <a href="dashboard.html"><i data-lucide="home"></i>Home</a>
      <a href="scan.html"><i data-lucide="scan-line"></i>Scan</a>
      <a href="locker.html"><i data-lucide="folder-lock"></i>Locker</a>
      <a class="active" href="report.html"><i data-lucide="file-warning"></i>Report</a>
      <a href="profile.html"><i data-lucide="user-round"></i>Profile</a>
    </nav>
  </main>
  <script src="assets/js/mobile.js"></script>
</body>
</html>
