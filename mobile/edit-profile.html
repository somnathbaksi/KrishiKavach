<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile | Krishi Kavach AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/mobile.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main class="phone has-tabbar">
    <section class="screen">
      <header class="appbar"><div class="title-row"><a class="icon-btn" href="profile.html"><i data-lucide="arrow-left"></i></a><div class="title-text"><h1>Edit Profile</h1><span>Farmer details</span></div></div></header>
      <section class="card">
        <form class="form">
          <div class="field"><label for="name">Name</label><input id="name" type="text" value="Ramesh Patil"></div>
          <div class="field"><label for="mobile">Mobile</label><input id="mobile" type="tel" value="+91 98765 43210"></div>
          <div class="field"><label for="village">Village</label><input id="village" type="text" value="Tasgaon"></div>
          <div class="field"><label for="district">District</label><input id="district" type="text" value="Sangli"></div>
          <a class="btn btn-primary" href="profile.html">Save Changes</a>
        </form>
      </section>
    </section>
    <nav class="tabbar"><a href="dashboard.html"><i data-lucide="home"></i>Home</a><a href="scan.html"><i data-lucide="scan-line"></i>Scan</a><a href="locker.html"><i data-lucide="folder-lock"></i>Locker</a><a href="report.html"><i data-lucide="file-warning"></i>Report</a><a class="active" href="profile.html"><i data-lucide="user-round"></i>Profile</a></nav>
