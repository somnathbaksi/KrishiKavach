<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krishi Kavach AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="stylesheet" href="assets/css/mobile.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main class="phone">
    <section class="splash-screen">
      <div class="brand-row">
        <div class="brand-mark logo-mark"><img src="assets/img/favicon.png" alt="Krishi Kavach"></div>
        <div class="brand-text"><strong>Krishi Kavach</strong><span>किसान सुरक्षा प्लेटफॉर्म</span></div>
      </div>

      <div class="splash-logo-card">
        <img class="app-logo-full" src="assets/img/krishi-kavach-logo.png" alt="Krishi Kavach">
      </div>

      <div class="splash-copy">
        <h1>नकली कृषि उत्पादों से किसान की सुरक्षा।</h1>
        <p>बीज, खाद और कीटनाशक की जांच करें, जियो टैग सबूत सेव करें और शिकायत रिपोर्ट तैयार करें।</p>
        <div class="splash-loader"><span></span></div>
        <div class="actions">
          <a class="btn btn-yellow" href="onboarding.html"><i data-lucide="sparkles"></i>Start</a>
          <a class="btn btn-ghost" href="login.html"><i data-lucide="log-in"></i>Login</a>
        </div>
      </div>
    </section>
  </main>
  <script src="assets/js/mobile.js"></script>
</body>
</html>
