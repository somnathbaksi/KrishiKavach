<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password | Krishi Kavach AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/mobile.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main class="phone auth-screen">
    <div class="appbar"><a class="icon-btn" href="login.html"><i data-lucide="arrow-left"></i></a></div>
    <section class="auth-card">
      <div class="auth-title"><h1>Change password</h1><p>Create a new password for your Krishi Kavach account.</p></div>
      <form class="form">
        <div class="field"><label for="newPassword">New Password</label><input id="newPassword" type="password" placeholder="Enter new password"></div>
        <div class="field"><label for="confirmPassword">Confirm Password</label><input id="confirmPassword" type="password" placeholder="Repeat new password"></div>
        <a class="btn btn-primary" href="login.html"><i data-lucide="lock-keyhole"></i>Update Password</a>
      </form>
    </section>
  </main>
  <script src="assets/js/mobile.js"></script>
</body>
</html>
