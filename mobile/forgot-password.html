<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Krishi Kavach AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/mobile.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main class="phone auth-screen">
    <div class="appbar"><a class="icon-btn" href="login.html"><i data-lucide="arrow-left"></i></a></div>
    <section class="auth-card">
      <div class="auth-title"><h1>Forgot password</h1><p>Enter registered mobile or email to receive an OTP.</p></div>
      <form class="form">
        <div class="field"><label for="resetId">Mobile or Email</label><input id="resetId" type="text" placeholder="+91 98765 43210"></div>
        <a class="btn btn-primary" href="otp-verification.html"><i data-lucide="send"></i>Send OTP</a>
      </form>
      <div class="auth-links"><a href="login.html">Back to login</a><a href="register.html">Register</a></div>
    </section>
  </main>
  <script src="assets/js/mobile.js"></script>
</body>
</html>
