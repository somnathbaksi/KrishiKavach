<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Permissions | Krishi Kavach AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/mobile.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main class="phone">
    <section class="screen">
      <header class="appbar"><a class="icon-btn" href="role-selection.html"><i data-lucide="arrow-left"></i></a></header>
      <section class="card">
        <div class="card-head"><h2>Allow App Access</h2><span class="badge yellow">Required</span></div>
        <div class="list">
          <div class="list-row"><div class="status-icon ok"><i data-lucide="camera"></i></div><div><strong>Camera</strong><span>Capture product packet and crop damage photos.</span></div><span class="badge green">Allow</span></div>
          <div class="list-row"><div class="status-icon warn"><i data-lucide="map-pin"></i></div><div><strong>Location</strong><span>Add village and field context to evidence.</span></div><span class="badge green">Allow</span></div>
          <div class="list-row"><div class="status-icon ok"><i data-lucide="bell"></i></div><div><strong>Notifications</strong><span>Receive risk alerts and report reminders.</span></div><span class="badge green">Allow</span></div>
        </div>
      </section>
      <a class="btn btn-primary" href="register.html">Continue Registration</a>
    </section>
  </main>
  <script src="assets/js/mobile.js"></script>
</body>
</html>
